---

application:
  api-server-url: ${env.API_SERVER_URL}

server:
  port: ${env.PORT}

spring:
  devtools:
    restart:
      additional-paths:
      - src/main/resources/static
      - src/main/resources/templates
  security:
    oauth2:
      client:
        provider:
          auth0:
            authorization-uri: https://${env.AUTH0_DOMAIN}/authorize?audience=${env.AUTH0_AUDIENCE}
            issuer-uri: https://${env.AUTH0_DOMAIN}/
        registration:
          auth0:
            client-id: ${env.AUTH0_CLIENT_ID}
            client-secret: ${env.AUTH0_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths:
            - /**
      cache:
        cachecontrol:
          max-age: 31536000
          must-revalidate: true

...
